<!doctype html>
<html lang="en">
  <head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <title>Aura Offline</title>
    <style>
      body {
        margin: 0;
        min-height: 100vh;
        display: grid;
        place-items: center;
        background: radial-gradient(circle at 20% 20%, #0b1220 0%, #020617 45%, #000 100%);
        color: #e2e8f0;
        font-family: Segoe UI, sans-serif;
      }
      .card {
        max-width: 560px;
        margin: 1rem;
        padding: 1.5rem;
        border-radius: 14px;
        border: 1px solid rgba(96, 165, 250, 0.4);
        background: rgba(15, 23, 42, 0.85);
        box-shadow: 0 10px 40px rgba(2, 6, 23, 0.45);
      }
      h1 { margin-top: 0; color: #93c5fd; }
      p { line-height: 1.5; color: #cbd5e1; }
      .hint {
        margin-top: 1rem;
        font-size: 0.92rem;
        color: #94a3b8;
      }
    </style>
  </head>
  <body>
    <main class="card">
      <h1>You are offline</h1>
      <p>Aura can still show cached pages and assets. New conversions will resume automatically when your connection returns.</p>
      <p class="hint">Keep this tab open to allow queued requests to retry in the background.</p>
    </main>
  </body>
</html>
