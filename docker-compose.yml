version: '3.8'

services:
  backend:
    build: 
      context: ./backend
      dockerfile: Dockerfile
    restart: always
    environment:
      - DATABASE_URL=sqlite:///./aura_platform.db
    ports:
      - "8000:8000"
    volumes:
      - ./backend:/app
      - ./aura_platform.db:/app/aura_platform.db

  frontend:
    build:
      context: ./frontend
      dockerfile: Dockerfile
    ports:
      - "5173:5173"
    volumes:
      - ./frontend:/app
      - /app/node_modules
    depends_on:
      - backend

volumes:
  # Not using a separate DB volume as we're using SQLite for development.
  asset_storage:
